<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026 暑期亚洲夏令营导航 · 日韩 + 东南亚 + 斯里兰卡</title>
<style>
:root{--bg:#0e1116;--card:#1a1f2b;--border:#2a3142;--accent:#7cc4ff;--accent2:#ffb86b;--text:#e6ebf2;--mute:#8b95a7;--ok:#4ade80;--warn:#fbbf24;--danger:#f87171}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
header{padding:28px 24px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#141926,#0e1116)}
h1{margin:0 0 6px;font-size:24px}
header p{margin:4px 0;color:var(--mute);font-size:13px}
.notice{margin:12px 0 0;padding:10px 14px;background:#3a2a14;border-left:3px solid var(--warn);border-radius:4px;color:#ffe2b8;font-size:13px}
.controls{display:flex;flex-wrap:wrap;gap:8px;padding:16px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(14,17,22,.95);backdrop-filter:blur(8px);z-index:10}
.chip{padding:6px 12px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:20px;cursor:pointer;font-size:13px}
.chip.active{background:var(--accent);color:#0e1116;border-color:var(--accent);font-weight:600}
input[type=search]{flex:1;min-width:180px;padding:7px 12px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:20px;font-size:13px}
.climate{padding:14px 24px;background:#141926;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--mute);display:none}
.climate.open{display:block}
.climate table{width:100%;border-collapse:collapse;margin-top:8px}
.climate th,.climate td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.climate th{color:var(--accent);font-weight:600}
.season-peak{color:var(--danger)}
.season-shoulder{color:var(--ok)}
.season-low{color:var(--mute)}
.climate .rec{color:#ffe2b8;font-size:12px;margin-top:6px}
.toggle-climate{cursor:pointer;color:var(--accent);font-size:12px;background:none;border:none;padding:4px 0;text-decoration:underline}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:20px 24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:transform .15s,border-color .15s;cursor:pointer}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card.unverified{opacity:.78}
.card.unverified:hover{opacity:1}
.cover{aspect-ratio:16/9;background:#222 center/cover no-repeat;border-bottom:1px solid var(--border);position:relative}
.cover .flag{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);padding:3px 8px;border-radius:10px;font-size:12px}
.badges{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.bg{padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600}
.bg-ok{background:rgba(74,222,128,.85);color:#000}
.bg-warn{background:rgba(251,191,36,.85);color:#000}
.bg-danger{background:rgba(248,113,113,.85);color:#000}
.bg-info{background:rgba(124,196,255,.85);color:#000}
.body{padding:14px 16px;flex:1;display:flex;flex-direction:column}
.body h3{margin:0 0 4px;font-size:16px}
.body .en{color:var(--mute);font-size:12px;margin-bottom:10px}
.row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.tag{background:#0e1116;border:1px solid var(--border);padding:2px 8px;border-radius:10px;font-size:11px;color:var(--accent)}
.kv{font-size:12.5px;color:var(--mute);margin:3px 0}
.kv b{color:var(--text);font-weight:500}
.price{font-size:15px;color:var(--accent2);margin:8px 0 4px;font-weight:600}
.actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.btn{flex:1;text-align:center;padding:7px;background:#0e1116;border:1px solid var(--border);color:var(--text);border-radius:6px;text-decoration:none;font-size:12.5px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#0e1116;border-color:var(--accent);font-weight:600}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:12px;max-width:780px;width:100%;max-height:90vh;overflow:auto}
.modal-box h2{margin:0 0 6px;padding:18px 20px 0}
.modal-body{padding:0 20px 20px}
.modal-body section{margin:14px 0;padding-top:14px;border-top:1px solid var(--border)}
.modal-body section:first-child{border:none;padding-top:0}
.modal-body h4{margin:0 0 6px;font-size:13px;color:var(--accent)}
.close{float:right;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:14px 18px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;background:#222}
.warn-box{background:#3a2a14;border-left:3px solid var(--warn);padding:10px 14px;border-radius:4px;color:#ffe2b8;font-size:12.5px;margin:10px 0}
footer{text-align:center;padding:24px;color:var(--mute);font-size:12px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <h1>🏕️ 2026 暑期亚洲夏令营导航</h1>
  <p>日韩 + 东南亚 + 斯里兰卡 · <b id="ct-total">…</b> 个面向 8-13 岁儿童的项目 · 含语言/STEAM/户外/冲浪/野生动物/体育/文化等主题</p>
  <div class="notice">⚠️ <b>数据状态</b>：官网存活 <b id="ct-live"></b> · 真实封面图 <b id="ct-img"></b> · 已重新核验官方报名页 <b id="ct-found"></b> · <b style="color:#f87171">未找到官方信息（已置底）</b> <b id="ct-notfound"></b>。所有 2026 年具体档期/价格仍以官网为准。</div>
  <button class="toggle-climate" onclick="toggleClimate()">📅 展开各国 6/7/8 月气候 + 推荐月份 ▼</button>
  <div id="climate" class="climate"><table id="ct-tbl"></table></div>
</header>
<div class="controls">
  <button class="chip active" data-filter="all">全部 <span id="ct-all"></span></button>
  <button class="chip" data-filter="日本">🇯🇵 日本</button>
  <button class="chip" data-filter="韩国">🇰🇷 韩国</button>
  <button class="chip" data-filter="新加坡">🇸🇬 新加坡</button>
  <button class="chip" data-filter="马来西亚">🇲🇾 马来西亚</button>
  <button class="chip" data-filter="菲律宾">🇵🇭 菲律宾</button>
  <button class="chip" data-filter="泰国">🇹🇭 泰国</button>
  <button class="chip" data-filter="印度尼西亚">🇮🇩 巴厘岛</button>
  <button class="chip" data-filter="越南">🇻🇳 越南</button>
  <button class="chip" data-filter="斯里兰卡">🇱🇰 斯里兰卡</button>
  <input type="search" id="q" placeholder="搜索：英语 / 编程 / 冲浪 / 野生动物 / 巴厘岛...">
</div>
<div id="grid" class="grid"></div>
<div id="modal" class="modal"><div class="modal-box"><button class="close" onclick="closeModal()">✕</button><h2 id="m-name"></h2><div id="m-body" class="modal-body"></div></div></div>
<footer>数据基于公开信息整理 · 2026 排期多数官网将于 1-3 月公布 · 报名前请核验官网最新信息<br>
<a href="https://github.com/shawnq-msft/summer-camps-2026" target="_blank" style="color:#7cc4ff">GitHub 源码</a></footer>

<script>
const FLAG={'日本':'🇯🇵','韩国':'🇰🇷','新加坡':'🇸🇬','马来西亚':'🇲🇾','菲律宾':'🇵🇭','泰国':'🇹🇭','印度尼西亚':'🇮🇩','越南':'🇻🇳','斯里兰卡':'🇱🇰'};
let DATA=[],CLIMATE={},FILTER='all',Q='';

Promise.all([
  fetch('all.json').then(r=>r.json()),
  fetch('climate.json').then(r=>r.json()).catch(_=>({}))
]).then(([d,cl])=>{
  DATA=d; CLIMATE=cl;
  document.getElementById('ct-total').textContent=d.length;
  document.getElementById('ct-all').textContent='('+d.length+')';
  document.getElementById('ct-live').textContent=d.filter(c=>c.website_live).length;
  document.getElementById('ct-img').textContent=d.filter(c=>c.cover_local && !c.cover_local.endsWith('.svg')).length;
  document.getElementById('ct-found').textContent=d.filter(c=>c.refind_status==='found').length;
  document.getElementById('ct-notfound').textContent=d.filter(c=>c.refind_status==='not_found').length;
  renderClimate();
  render();
});

function renderClimate(){
  const tbl=document.getElementById('ct-tbl');
  let html='<thead><tr><th>国家/地区</th><th>6月</th><th>7月</th><th>8月</th><th>建议月份</th></tr></thead><tbody>';
  for(const [country,info] of Object.entries(CLIMATE)){
    const cell=m=>{const x=info[m];if(!x)return '-';return `<div class="season-${x.season}"><b>${x.temp||''}</b><br><span style="font-size:11px">${x.weather||''}</span></div>`};
    const sug=(info.suggested_months||[]).join(' / ')||'-';
    html+=`<tr><td><b>${country}</b><br><span style="font-size:11px;color:#8b95a7">${info.recommendation||''}</span></td><td>${cell('jun')}</td><td>${cell('jul')}</td><td>${cell('aug')}</td><td style="color:#ffe2b8">${sug}</td></tr>`;
    if(info.region_notes){
      html+=`<tr><td colspan="5" style="font-size:11.5px;color:#8b95a7;padding-left:20px">${Object.entries(info.region_notes).map(([k,v])=>`<b>${k}</b>: ${v}`).join(' · ')}</td></tr>`;
    }
  }
  html+='</tbody>';
  tbl.innerHTML=html;
}
function toggleClimate(){document.getElementById('climate').classList.toggle('open')}

function render(){
  const grid=document.getElementById('grid');
  const list=DATA.filter(c=>(FILTER==='all'||c.country===FILTER) &&
    (!Q||JSON.stringify(c).toLowerCase().includes(Q.toLowerCase())));
  grid.innerHTML=list.map(c=>{
    const idx=DATA.indexOf(c);
    const img=c.cover_local || (c.images&&c.images[0]&&c.images[0].url)||'';
    const ses=(c.sessions||[])[0];
    const sesText=ses?`${ses.start||'?'}~${ses.end||'?'} ${ses.days?'('+ses.days+'天)':''}`:'见详情';
    const themes=(c.themes||[]).slice(0,3);
    const isNotFound=c.refind_status==='not_found';
    const badges=[];
    if(c.status==='confirmed_2026') badges.push('<span class="bg bg-ok">✓ 2026已确认</span>');
    else badges.push('<span class="bg bg-warn">2026 待官方公布</span>');
    if(c.refind_status==='found') badges.push('<span class="bg bg-info">官网已核验</span>');
    if(isNotFound) badges.push('<span class="bg bg-danger">官方信息未找到</span>');
    return `<div class="card ${isNotFound?'unverified':''}" onclick="openModal(${idx})">
      <div class="cover" style="background-image:url('${img}')">
        <span class="flag">${FLAG[c.country]||''} ${c.city||''}</span>
        <div class="badges">${badges.join('')}</div>
      </div>
      <div class="body">
        <h3>${c.name_cn||c.name_en}</h3>
        <div class="en">${c.name_en||''}</div>
        <div class="row">${themes.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="kv">📅 <b>${sesText}</b></div>
        <div class="kv">👶 ${c.age_range||'?'} · ${c.need_guardian?'需陪同':'独立营'}</div>
        <div class="price">💰 ${c.price_cny_est||c.price_local||'询价'}</div>
        <div class="actions">
          <a class="btn ${c.contact&&c.contact.registration?'btn-primary':''}" href="${(c.contact&&(c.contact.registration||c.contact.website))||'#'}" target="_blank" onclick="event.stopPropagation()">${c.contact&&c.contact.registration?'📝 报名':'🌐 官网'}</a>
          <a class="btn">详情</a>
        </div>
      </div>
    </div>`;
  }).join('')||'<p style="color:#8b95a7;padding:40px;text-align:center;grid-column:1/-1">没有匹配项</p>';
}

function openModal(i){
  const c=DATA[i],m=document.getElementById('m-body');
  document.getElementById('m-name').innerHTML=`${FLAG[c.country]||''} ${c.name_cn||''} <span style="color:#8b95a7;font-size:14px;font-weight:400">${c.name_en||''}</span>`;
  const ses=(c.sessions||[]).map(s=>`<li>${s.start||'?'} ~ ${s.end||'?'} · ${s.days||'?'} 天</li>`).join('');
  const themes=(c.themes||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const imgs=(c.images||[]).map(x=>`<img src="${x.url}" alt="${x.caption||''}" loading="lazy" onerror="this.style.opacity=.2">`).join('');
  const ct=c.contact||{};
  const ctRows=[
    ct.registration&&`📝 <b>报名</b>：<a href="${ct.registration}" target="_blank" style="color:#7cc4ff">${ct.registration}</a>`,
    ct.website&&`🌐 <a href="${ct.website}" target="_blank" style="color:#7cc4ff">${ct.website}</a>`,
    ct.email&&`✉️ <a href="mailto:${ct.email}" style="color:#7cc4ff">${ct.email}</a>`,
    ct.phone&&`📞 ${ct.phone}`,
    ct.whatsapp&&`📱 WhatsApp：${ct.whatsapp}`,
    ct.wechat&&`💬 微信：${ct.wechat}`,
    ct.xiaohongshu&&`📕 小红书：${ct.xiaohongshu}`,
    ct.other&&`ℹ️ ${ct.other}`,
  ].filter(Boolean).map(x=>`<div class="kv" style="font-size:13px">${x}</div>`).join('');
  const src=(c.source_urls||c.sources||[]).map(u=>`<a href="${u}" target="_blank" style="color:#7cc4ff;font-size:12px;display:block">${u}</a>`).join('');
  const isNotFound=c.refind_status==='not_found';
  const warnHtml=isNotFound?'<div class="warn-box">⚠️ <b>未找到 2026 官方报名页面</b>。'+(c.refind_notes||'')+' 建议直接邮件/电话联系学校招生处或搜索"<i>'+(c.name_en||c.name_cn)+' summer 2026</i>"。</div>':
    (c.status==='tentative_2026'?'<div class="warn-box">📌 2026 排期为基于历年信息的预估，'+(c.refind_notes?'<br>'+c.refind_notes:'')+' 请以官网最新公告为准。</div>':'');
  m.innerHTML=`
    ${warnHtml}
    <section><div class="kv">📍 <b>${c.country} · ${c.city||''} · ${c.venue||''}</b></div>
      <div class="kv">👶 适龄 ${c.age_range||'?'} ${c.need_guardian?' · 需家长陪同':' · 独立营'}</div>
      <div class="row" style="margin-top:8px">${themes}</div></section>
    <section><h4>📅 营期</h4><ul style="margin:0;padding-left:20px">${ses||'<li>见官网</li>'}</ul></section>
    <section><h4>💰 价格</h4>
      <div class="kv"><b>${c.price_local||'?'}</b> · 估算 ${c.price_cny_est||'?'}</div>
      <div class="kv">含：${c.price_includes||'见官网'}</div></section>
    ${c.highlights?`<section><h4>✨ 特色亮点</h4><div>${Array.isArray(c.highlights)?c.highlights.map(h=>'• '+h).join('<br>'):c.highlights}</div></section>`:''}
    ${c.daily_schedule?`<section><h4>📋 日程概要</h4><div style="white-space:pre-wrap">${c.daily_schedule}</div></section>`:''}
    <section><h4>📞 联系报名</h4>${ctRows||'见官网'}</section>
    ${imgs?`<section><h4>🖼️ 图片</h4><div class="gallery">${imgs}</div></section>`:''}
    ${src?`<section><h4>📚 信息来源</h4>${src}</section>`:''}
  `;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');FILTER=b.dataset.filter;render()});
document.getElementById('q').oninput=e=>{Q=e.target.value;render()};
</script>
</body></html>
