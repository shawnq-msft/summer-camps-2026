<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026 亚洲暑期营地导航 · 毛豆专用</title>
<style>
:root{--bg:#0f1419;--card:#1a2028;--text:#e5e7eb;--mute:#94a3b8;--accent:#22d3ee;--ok:#10b981;--warn:#f59e0b;--bad:#ef4444}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
header{padding:20px 16px;border-bottom:1px solid #2d3748;position:sticky;top:0;background:var(--bg);z-index:10}
h1{margin:0 0 8px;font-size:20px}
.sub{color:var(--mute);font-size:13px;margin-bottom:12px}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.controls select,.controls input{background:#0b0f14;color:var(--text);border:1px solid #2d3748;padding:6px 10px;border-radius:6px;font-size:13px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{padding:5px 11px;border-radius:14px;background:#252d38;border:1px solid #374151;cursor:pointer;font-size:12px;user-select:none}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.chip.toggle{background:#1f2937}
.chip.toggle.active{background:var(--ok);border-color:var(--ok);color:#000}
main{max-width:1280px;margin:0 auto;padding:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #2d3748;transition:transform .15s}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card.unverified{opacity:.62;order:99}
.card img,.card object{width:100%;height:150px;object-fit:cover;display:block;background:#0b0f14}
.card .body{padding:11px}
.card h3{margin:0 0 4px;font-size:14px;line-height:1.35}
.card .meta{font-size:11px;color:var(--mute);margin-bottom:6px}
.price-row{display:flex;align-items:baseline;gap:6px;margin:6px 0}
.price{color:var(--accent);font-size:18px;font-weight:700}
.price-unit{color:var(--mute);font-size:11px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:10px;padding:2px 6px;border-radius:3px;background:#0b1220;border:1px solid #1e293b;color:#9ca3af}
.tag.ok{background:#064e3b;border-color:#065f46;color:#6ee7b7}
.tag.no{background:#7f1d1d40;border-color:#991b1b40;color:#fca5a5}
.tag.par{background:#78350f40;border-color:#92400e40;color:#fcd34d}
.tag.confirmed{background:var(--ok);color:#000;border:none}
.tag.unverified{background:var(--bad);color:#fff;border:none}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;overflow-y:auto;padding:20px}
.modal.show{display:block}
.modal-body{max-width:760px;margin:20px auto;background:var(--card);border-radius:10px;padding:24px}
.close{float:right;font-size:24px;cursor:pointer;color:var(--mute)}
.modal h2{margin-top:0}
.modal a{color:var(--accent);word-break:break-all}
.field{margin:10px 0;padding-bottom:10px;border-bottom:1px solid #2d3748}
.field strong{color:var(--accent);display:block;font-size:12px;text-transform:uppercase;margin-bottom:4px}
.btn{display:inline-block;padding:7px 14px;background:#1e40af;color:#fff!important;border-radius:5px;text-decoration:none;font-size:13px;margin:3px 6px 3px 0}
.btn.signup{background:#2563eb}
.btn.cn{background:#dc2626}
.notice{background:#1e293b;border-left:3px solid var(--warn);padding:10px 14px;margin:10px 0;font-size:12px;color:var(--mute)}
.climate{display:none;background:#0b1220;padding:14px;border-radius:8px;margin-top:10px;font-size:12px}
.climate.show{display:block}
.climate table{width:100%;border-collapse:collapse}
.climate th,.climate td{padding:5px 7px;border:1px solid #1e293b;text-align:left}
.climate th{background:#1e293b;color:var(--accent)}
.stats{font-size:11px;color:var(--mute);margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>🏕️ 2026 亚洲暑期营地导航 <span style="color:var(--mute);font-size:13px;font-weight:400">· 毛豆专用 · <span id="count">0</span> 项</span></h1>
  <div class="sub">日韩+东南亚+斯里兰卡 · 价格统一换算 ¥（参考汇率，仅供估算）· 标⚠️未核验/标✅已确认 2026</div>

  <div class="controls">
    <input id="q" placeholder="🔎 搜索名称/城市/主题" style="flex:1;min-width:180px">
    <select id="sort">
      <option value="default">排序：默认（已确认优先）</option>
      <option value="price-asc">价格 ↑（低到高）</option>
      <option value="price-desc">价格 ↓（高到低）</option>
      <option value="perday-asc">日均价 ↑</option>
      <option value="days-desc">营期 ↓（长到短）</option>
      <option value="days-asc">营期 ↑（短到长）</option>
    </select>
    <button class="chip toggle" id="climateBtn">🌤️ 气候面板</button>
  </div>

  <div class="chips" id="countries"></div>
  <div class="chips" id="filters" style="margin-top:6px">
    <span class="chip toggle" data-f="lodging">🏠 含住宿</span>
    <span class="chip toggle" data-f="meals">🍽️ 三餐全包</span>
    <span class="chip toggle" data-f="confirmed">✅ 已确认2026</span>
    <span class="chip toggle" data-f="cn">🇨🇳 有中文中介/小红书</span>
    <span class="chip toggle" data-f="real-img">🖼️ 真实图</span>
    <span class="chip toggle" data-f="under5k">💴 总价 ≤ ¥5000</span>
    <span class="chip toggle" data-f="under15k">💴 总价 ≤ ¥15000</span>
  </div>

  <div class="climate" id="climatePanel"></div>
  <div class="stats" id="stats"></div>
</header>

<main><div class="grid" id="grid"></div></main>

<div class="modal" id="modal"><div class="modal-body" id="modalBody"></div></div>

<script>
let DATA=[],CLIMATE={},state={country:'all',q:'',sort:'default',flags:new Set()};

const fmt = n => n==null?'?':('¥'+n.toLocaleString());

function priceLabel(d){
  if(d.price_cny_total_typical && d.days_typical){
    return `${fmt(d.price_cny_total_typical)} / ${d.days_typical}天`;
  }
  if(d.price_cny_per_day) return `${fmt(d.price_cny_per_day)} /天`;
  return d.price_cny_est || '价格待询';
}

function lodgingTag(d){
  if(d.includes_lodging===true) return '<span class="tag ok">🏠 含住</span>';
  if(d.includes_lodging===false) return '<span class="tag no">走读</span>';
  return '';
}
function mealTag(d){
  if(d.includes_meals===true) return '<span class="tag ok">🍽️ 三餐</span>';
  if(d.includes_meals==='partial') return '<span class="tag par">含部分餐</span>';
  if(d.includes_meals===false) return '<span class="tag no">不含餐</span>';
  return '';
}

function renderCard(d){
  const img = d.cover_local||`images/${d.id}.svg`;
  const ext = img.split('.').pop().toLowerCase();
  const imgEl = ext==='svg' ? `<object type="image/svg+xml" data="${img}"></object>` : `<img src="${img}" loading="lazy" onerror="this.style.background='#1e293b'">`;
  const conf = d.confirmed_2026 ? '<span class="tag confirmed">✅2026</span>' : '';
  const unv = d.refind_status==='not_found' ? '<span class="tag unverified">⚠️ 未核验</span>' : '';
  return `<div class="card ${d.refind_status==='not_found'?'unverified':''}" data-id="${d.id}">
    ${imgEl}
    <div class="body">
      <h3>${d.name_cn||d.name_en}</h3>
      <div class="meta">📍 ${d.country} · ${d.city||''}</div>
      <div class="price-row"><span class="price">${priceLabel(d)}</span></div>
      <div class="tags">${conf}${unv}${lodgingTag(d)}${mealTag(d)}${(d.themes||[]).slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div></div>`;
}

function applyFilters(){
  let arr = DATA.filter(d=>{
    if(state.country!=='all' && d.country!==state.country) return false;
    if(state.q){
      const q = state.q.toLowerCase();
      const blob = `${d.name_cn} ${d.name_en} ${d.city} ${(d.themes||[]).join(' ')}`.toLowerCase();
      if(!blob.includes(q)) return false;
    }
    for(const f of state.flags){
      if(f==='lodging' && d.includes_lodging!==true) return false;
      if(f==='meals' && d.includes_meals!==true) return false;
      if(f==='confirmed' && !d.confirmed_2026) return false;
      if(f==='cn' && !d.cn_contacts) return false;
      if(f==='real-img' && !d.cover_local) return false;
      if(f==='under5k' && (!d.price_cny_total_typical || d.price_cny_total_typical>5000)) return false;
      if(f==='under15k' && (!d.price_cny_total_typical || d.price_cny_total_typical>15000)) return false;
    }
    return true;
  });
  arr.sort((a,b)=>{
    // unverified always last
    const au = a.refind_status==='not_found'?1:0, bu = b.refind_status==='not_found'?1:0;
    if(au!==bu) return au-bu;
    if(state.sort==='price-asc') return (a.price_cny_total_typical||999999)-(b.price_cny_total_typical||999999);
    if(state.sort==='price-desc') return (b.price_cny_total_typical||0)-(a.price_cny_total_typical||0);
    if(state.sort==='perday-asc') return (a.price_cny_per_day||999999)-(b.price_cny_per_day||999999);
    if(state.sort==='days-desc') return (b.days_typical||0)-(a.days_typical||0);
    if(state.sort==='days-asc') return (a.days_typical||999)-(b.days_typical||999);
    // default: confirmed first
    const ac = a.confirmed_2026?0:1, bc = b.confirmed_2026?0:1;
    if(ac!==bc) return ac-bc;
    return (a.id||0)-(b.id||0);
  });
  document.getElementById('grid').innerHTML = arr.map(renderCard).join('');
  document.getElementById('count').textContent = arr.length;
  // stats
  const prices = arr.map(d=>d.price_cny_total_typical).filter(Boolean);
  if(prices.length){
    const min=Math.min(...prices), max=Math.max(...prices);
    const avg=Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
    document.getElementById('stats').textContent = `当前 ${arr.length} 项 · 价格区间 ${fmt(min)} ~ ${fmt(max)} · 均价 ${fmt(avg)}`;
  } else {
    document.getElementById('stats').textContent = `当前 ${arr.length} 项`;
  }
}

function renderModal(d){
  const sess = (d.sessions||[]).map(s=>`<div>📅 ${s.start} → ${s.end} <span style="color:var(--mute)">${s.days||''}</span></div>`).join('');
  const cn = d.cn_contacts ? `<div class="field"><strong>🇨🇳 中文资源</strong>
    ${d.cn_contacts.xiaohongshu_url?`<a class="btn cn" href="${d.cn_contacts.xiaohongshu_url}" target="_blank">小红书</a>`:''}
    ${(d.cn_contacts.sources||[]).map(s=>`<div><a href="${s}" target="_blank">${s}</a></div>`).join('')}
    ${d.cn_contacts.notes?`<div style="color:var(--mute);font-size:12px;margin-top:6px">💡 ${d.cn_contacts.notes}</div>`:''}
  </div>`:'';
  const links = (d.source_urls||[]).map(u=>`<div><a href="${u}" target="_blank">${u}</a></div>`).join('');
  const signup = d.refind_status==='found' && d.refind_notes ? `<a class="btn signup" href="${d.refind_notes}" target="_blank">📝 报名页</a>`:'';
  const unv = d.refind_status==='not_found' ? `<div class="notice">⚠️ 未找到 2026 年官方报名页面，请通过其学校官网/前台核实</div>`:'';

  return `<span class="close" onclick="closeModal()">×</span>
    <h2>${d.name_cn||d.name_en} ${d.confirmed_2026?'✅':''}</h2>
    <div style="color:var(--mute);margin-bottom:10px">${d.name_en||''} · ${d.name_local||''}</div>
    ${unv}
    <div class="price-row"><span class="price" style="font-size:24px">${priceLabel(d)}</span></div>
    <div class="tags">${lodgingTag(d)}${mealTag(d)}</div>

    <div class="field"><strong>📍 地点</strong>${d.country} · ${d.city||''}<br>${d.venue||''}</div>
    <div class="field"><strong>📅 营期</strong>${sess||'待定'}</div>
    <div class="field"><strong>💰 价格</strong>
      原价：${d.price_local||'—'}<br>
      估算：${d.price_cny_est||'—'}<br>
      日均：${fmt(d.price_cny_per_day)} / 天 · 区间 ${fmt(d.price_cny_min)} ~ ${fmt(d.price_cny_max)}<br>
      ${d.price_includes?`含：${d.price_includes}`:''}
    </div>
    <div class="field"><strong>🏠 住宿</strong>${d.includes_lodging===true?'✅ 含住宿':d.includes_lodging===false?'❌ 走读不含住':'?'} ${d.lodging_note?'· '+d.lodging_note:''}</div>
    <div class="field"><strong>🍽️ 餐饮</strong>${d.includes_meals===true?'✅ 三餐全包':d.includes_meals==='partial'?'🟡 部分餐（如午餐）':d.includes_meals===false?'❌ 不含餐':'?'} ${d.meals_note?'· '+d.meals_note:''}</div>
    <div class="field"><strong>🎯 主题</strong>${(d.themes||[]).join(' · ')}</div>
    <div class="field"><strong>👥 年龄</strong>${d.age_range||'?'}${d.need_guardian?' · 需家长陪同':''}</div>
    ${d.highlights?`<div class="field"><strong>✨ 亮点</strong>${(Array.isArray(d.highlights)?d.highlights:[d.highlights]).join(' · ')}</div>`:''}
    <div class="field"><strong>🔗 链接</strong>${signup}${(d.contact?.website?`<a class="btn" href="${d.contact.website}" target="_blank">官网</a>`:'')}<br>${links}</div>
    ${cn}`;
}

function openModal(d){document.getElementById('modalBody').innerHTML=renderModal(d);document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};

document.getElementById('grid').addEventListener('click',e=>{
  const c=e.target.closest('.card'); if(c){const d=DATA.find(x=>x.id==c.dataset.id);if(d)openModal(d)}
});

document.getElementById('q').oninput=e=>{state.q=e.target.value;applyFilters()};
document.getElementById('sort').onchange=e=>{state.sort=e.target.value;applyFilters()};

document.getElementById('filters').addEventListener('click',e=>{
  if(!e.target.classList.contains('chip'))return;
  const f=e.target.dataset.f;
  if(state.flags.has(f)){state.flags.delete(f);e.target.classList.remove('active')}
  else{state.flags.add(f);e.target.classList.add('active')}
  applyFilters();
});

document.getElementById('climateBtn').onclick=()=>{
  const p=document.getElementById('climatePanel');
  p.classList.toggle('show');
  document.getElementById('climateBtn').classList.toggle('active');
  if(p.classList.contains('show') && !p.dataset.rendered){
    let html='<table><tr><th>国家</th><th>6月</th><th>7月</th><th>8月</th><th>建议</th></tr>';
    for(const [c,m] of Object.entries(CLIMATE)){
      html+=`<tr><td><b>${c}</b></td><td>${m.jun?.weather||'—'} ${m.jun?.temp||''}</td><td>${m.jul?.weather||'—'} ${m.jul?.temp||''}</td><td>${m.aug?.weather||'—'} ${m.aug?.temp||''}</td><td>${m.note||''}</td></tr>`;
    }
    html+='</table>';
    p.innerHTML=html; p.dataset.rendered='1';
  }
};

Promise.all([
  fetch('all.json').then(r=>r.json()),
  fetch('climate.json').then(r=>r.json()).catch(()=>({}))
]).then(([data,climate])=>{
  DATA=data; CLIMATE=climate;
  const countries=[...new Set(data.map(d=>d.country))].sort();
  const cn=document.getElementById('countries');
  cn.innerHTML='<span class="chip active" data-c="all">全部 '+data.length+'</span>'+
    countries.map(c=>`<span class="chip" data-c="${c}">${c} ${data.filter(d=>d.country===c).length}</span>`).join('');
  cn.addEventListener('click',e=>{
    if(!e.target.classList.contains('chip'))return;
    cn.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    e.target.classList.add('active');
    state.country=e.target.dataset.c;
    applyFilters();
  });
  applyFilters();
});
</script>
</body>
</html>
